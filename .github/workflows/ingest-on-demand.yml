name: On-demand price ingest

# Fired by PUT /v1/collection (GitHub repository_dispatch, event_type "new-cards")
# when a user adds a card that has no price yet. Drains price_backfill_queue and
# fetches just those cards' MTGJSON prices now, instead of waiting for the daily
# cron. Also runnable by hand.
on:
  repository_dispatch:
    types: [new-cards]
  workflow_dispatch: {}

# Shares the `ingest` group with daily + backfill so the three never write at
# the same time. cancel-in-progress: false — a burst of dispatches queues up,
# and each run drains the whole queue (later runs find it empty and no-op fast).
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  on-demand:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run on-demand ingest
        run: npm run ingest:on-demand
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICE_SOURCES: ${{ vars.PRICE_SOURCES }}
